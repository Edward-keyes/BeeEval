            padding-bottom: 10px;

        .chart-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .chart-wrapper {
            flex: 1;
            min-width: 45%;
        }

        .chart-title {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;

        @media (max-width: 768px) {

        // 处理数据：将毫秒转为秒，并按团队分组
        const processData = () => {
            // 将毫秒转为秒
            userData.forEach(item => {
                if (item.duration) {
                    item.duration = Math.round(item.duration / 1000);
                }
            });

            // 按团队分组
            const teamData = {};
            userData.forEach(item => {
                if (!teamData[item.team]) {
                    teamData[item.team] = {
                        pageViews: [],
                        videoViews: []
                    };
                }

                if (item.event_type === 'pageView') {
                    teamData[item.team].pageViews.push(item);
                } else if (item.event_type === 'videoView') {
                    teamData[item.team].videoViews.push(item);
                }
            });

            // 对每个团队的数据按持续时间排序并限制为前10项
            Object.keys(teamData).forEach(team => {
                // 页面访问排序
                teamData[team].pageViews.sort((a, b) => b.duration - a.duration);
                teamData[team].pageViews = teamData[team].pageViews.slice(0, 10);

                // 视频观看排序
                teamData[team].videoViews.sort((a, b) => b.duration - a.duration);
                teamData[team].videoViews = teamData[team].videoViews.slice(0, 10);
            });

            return teamData;
        };

        // 创建图表
        const createCharts = () => {
            const teamData = processData();
            const container = document.getElementById('dashboard-container');

            // 为每个团队创建部分
            Object.keys(teamData).forEach(team => {
                const teamSection = document.createElement('div');
                teamSection.className = 'team-section';

                // 团队标题
                const teamHeader = document.createElement('div');
                teamHeader.className = 'team-header';
                teamHeader.innerHTML = `<h2>${team}团队用户行为分析</h2>`;
                teamSection.appendChild(teamHeader);

                // 图表容器
                const chartContainer = document.createElement('div');
                chartContainer.className = 'chart-container';

                // 页面访问图表
                const pageChartWrapper = document.createElement('div');
                pageChartWrapper.className = 'chart-wrapper';

                const pageChartTitle = document.createElement('div');
                pageChartTitle.className = 'chart-title';
                pageChartTitle.textContent = '页面访问时长（秒）';

                const pageChartCanvas = document.createElement('canvas');
                pageChartCanvas.id = `page-chart-${team}`;

                pageChartWrapper.appendChild(pageChartTitle);
                pageChartWrapper.appendChild(pageChartCanvas);

                // 视频观看图表
                const videoChartWrapper = document.createElement('div');
                videoChartWrapper.className = 'chart-wrapper';

                const videoChartTitle = document.createElement('div');
                videoChartTitle.className = 'chart-title';
                videoChartTitle.textContent = '视频观看时长（秒）';

                const videoChartCanvas = document.createElement('canvas');
                videoChartCanvas.id = `video-chart-${team}`;

                videoChartWrapper.appendChild(videoChartTitle);
                videoChartWrapper.appendChild(videoChartCanvas);

                // 添加图表到容器
                chartContainer.appendChild(pageChartWrapper);
                chartContainer.appendChild(videoChartWrapper);
                teamSection.appendChild(chartContainer);

                // 添加团队部分到主容器
                container.appendChild(teamSection);

                // 创建页面访问图表
                const pageData = teamData[team].pageViews;
                createChart(
                    `page-chart-${team}`,
                    pageData.map(item => `${item.target_name}`),
                    pageData.map(item => item.duration),
                    900 // 15分钟 = 900秒
                );

                // 创建视频观看图表
                const videoData = teamData[team].videoViews;
                createChart(
                    `video-chart-${team}`,
                    videoData.map(item => item.target_name),
                    videoData.map(item => item.duration),
                    900 // 15分钟 = 900秒
                );
            });
        };

        // 创建单个图表
        const createChart = (canvasId, labels, data, thresholdValue) => {
            const ctx = document.getElementById(canvasId).getContext('2d');

            // 为超过阈值的数据设置红色
            const backgroundColor = data.map(value => value > thresholdValue ? 'rgba(255, 99, 132, 0.8)' : 'rgba(54, 162, 235, 0.8)');
            const borderColor = data.map(value => value > thresholdValue ? 'rgb(255, 99, 132)' : 'rgb(54, 162, 235)');

            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: '持续时间（秒）',
                        data: data,
                        backgroundColor: backgroundColor,
                        borderColor: borderColor,
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: '时长（秒）'
                            },
                            ticks: {
                                callback: function (value) {
                                    return value.toLocaleString();
                                }
                            }
                        },
                        x: {
                            ticks: {
                                maxRotation: 45,
                                minRotation: 45
                            }
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: function (context) {
                                    const value = context.raw;
                                    if (value >= 3600) {
                                        const hours = Math.floor(value / 3600);
                                        const mins = Math.floor((value % 3600) / 60);
                                        const secs = value % 60;
                                        return `${hours}小时 ${mins}分钟 ${secs}秒`;
                                    } else if (value >= 60) {
                                        const mins = Math.floor(value / 60);
                                        const secs = value % 60;
                                        return `${mins}分钟 ${secs}秒`;
                                    } else {
                                        return `${value}秒`;
                                    }
                                }
                            }
                        }
                    }
                }
            });
        };

        // 页面加载完成后初始化图表
        window.onload = function () {
            createCharts();
        };
